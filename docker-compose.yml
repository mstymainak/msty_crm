version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7-alpine
    container_name: msty-crm-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mstymainak_db_user
      MONGO_INITDB_ROOT_PASSWORD: Mahesh123
      MONGO_INITDB_DATABASE: msty_crm
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - msty-network

  # Next.js CRM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msty-crm-app
    ports:
      - "3000:3000"
    environment:
      # MongoDB Connection
      MONGODB_URI: mongodb://mstymainak_db_user:Mahesh123@mongodb:27017/msty_crm?authSource=admin
      
      # Meta Business Suite (Facebook)
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-msty_crm_verify_token_2026}
      META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN:-your_page_access_token_here}
      META_APP_SECRET: ${META_APP_SECRET:-your_app_secret_here}
      
      # WordPress Integration
      WORDPRESS_URL: ${WORDPRESS_URL:-https://tirthyatrawala.com}
      WORDPRESS_API_USER: ${WORDPRESS_API_USER:-admin}
      WORDPRESS_API_PASSWORD: ${WORDPRESS_API_PASSWORD:-Utkarsh@123}
      
      # Migration Security
      MIGRATION_KEY: ${MIGRATION_KEY:-CC46637FCE9F735F83001EBD5BD27D7E64AC7CA9EC592FEF6E832918BAA37373}
      
      # Auth Secret
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-e14a32f05ca4fe45b319af27697a27a227ba3849b39cf52cd02cd245e738978c}
      
      # Node Environment
      NODE_ENV: production
    
    depends_on:
      mongodb:
        condition: service_healthy
    
    restart: unless-stopped
    networks:
      - msty-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  msty-network:
    driver: bridge
